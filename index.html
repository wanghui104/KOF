<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini KOF Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
      background: #101116;
      color: #f4f1e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(225, 57, 48, 0.22), transparent 26%),
        linear-gradient(140deg, #121419 0%, #1a1c23 48%, #111318 100%);
      overflow: hidden;
    }

    .shell {
      width: min(100vw, 1120px);
      padding: 18px;
    }

    .stage-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #17191f;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
    }

    .hint {
      margin-top: 10px;
      min-height: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(244, 241, 232, 0.72);
      font-size: 13px;
      line-height: 1.4;
    }

    .hint span {
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .shell {
        padding: 8px;
      }

      .hint {
        font-size: 12px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage-frame" aria-label="Mini KOF game">
      <canvas id="game" width="960" height="540"></canvas>
    </section>
    <div class="hint">
      <span>1 开始 / 重开　2 暂停</span>
      <span>ASDW 移动　轻点W小跳 / 按住W跳　前前跑 / 后后跳　U轻拳 I轻腿 J重拳 K重腿　S蹲 / S+攻击</span>
    </div>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const floorY = 438;
    const gravity = 0.78;
    const simFps = 60;
    const simStepMs = 1000 / simFps;
    const maxFrameMs = simStepMs * 5;
    const keys = new Map();
    const justPressed = new Set();
    const showDebugBoxes = false;
    const inputConfig = {
      crouchTapHoldFrames: 4,
      attackBufferFrames: 10,
      dashTapFrames: 14,
      dashBufferFrames: 8,
      jumpSpeed: -18,
      shortHopSpeed: -12,
      jumpCutSpeed: -8,
    };
    let crouchTapFrames = 0;
    let attackBuffer = { name: null, frames: 0 };
    let directionTap = { direction: null, frames: 0 };
    let movementBuffer = { action: null, direction: 0, frames: 0 };
    const guardConfig = {
      startup: 1,
      recovery: 2,
      blockstun: 11,
      defenderPush: 0.62,
      attackerPush: 0.25,
    };

    const attacks = {
      lightPunch: {
        label: "轻拳",
        startup: 8,
        active: 5,
        recovery: 16,
        damage: 6,
        hitstun: 17,
        push: 4.5,
        hitRecoil: 1.55,
        hitLevel: "high",
        chainCancel: true,
        chainFollowup: true,
        chainWindow: 10,
        box: { x: 44, y: -86, w: 44, h: 22 },
      },
      heavyPunch: {
        label: "重拳",
        startup: 14,
        active: 6,
        recovery: 24,
        damage: 12,
        hitstun: 25,
        push: 7,
        hitLevel: "mid",
        box: { x: 50, y: -88, w: 62, h: 28 },
      },
      lightKick: {
        label: "轻腿",
        startup: 10,
        active: 5,
        recovery: 18,
        damage: 8,
        hitstun: 19,
        push: 5,
        hitRecoil: 1.45,
        hitLevel: "mid",
        chainCancel: true,
        chainFollowup: true,
        chainWindow: 10,
        box: { x: 35, y: -50, w: 70, h: 24 },
      },
      heavyKick: {
        label: "重腿",
        startup: 16,
        active: 7,
        recovery: 28,
        damage: 14,
        hitstun: 29,
        push: 8,
        hitLevel: "mid",
        box: { x: 40, y: -68, w: 86, h: 28 },
      },
      crouchLightPunch: {
        label: "下轻拳",
        startup: 7,
        active: 5,
        recovery: 13,
        damage: 5,
        hitstun: 15,
        push: 3.8,
        hitRecoil: 1.35,
        hitLevel: "mid",
        chainCancel: true,
        chainFollowup: true,
        chainWindow: 10,
        crouching: true,
        box: { x: 36, y: -58, w: 42, h: 20 },
      },
      crouchLightKick: {
        label: "下轻腿",
        startup: 8,
        active: 5,
        recovery: 15,
        damage: 6,
        hitstun: 21,
        push: 5.2,
        hitRecoil: 1.55,
        hitLevel: "low",
        mustCrouchBlock: true,
        chainCancel: true,
        chainFollowup: true,
        chainWindow: 11,
        crouching: true,
        pose: "lowKick",
        box: { x: 30, y: -32, w: 72, h: 18 },
      },
      crouchHeavyPunch: {
        label: "下重拳",
        startup: 11,
        active: 7,
        recovery: 25,
        damage: 12,
        hitstun: 24,
        push: 6.2,
        hitLevel: "mid",
        crouching: true,
        pose: "antiAir",
        box: { x: 28, y: -122, w: 48, h: 62 },
      },
      crouchHeavyKick: {
        label: "下重腿",
        startup: 15,
        active: 8,
        recovery: 42,
        damage: 14,
        hitstun: 29,
        push: 8,
        hitLevel: "low",
        mustCrouchBlock: true,
        crouching: true,
        pose: "sweep",
        box: { x: 34, y: -32, w: 96, h: 22 },
      },
      jumpLightPunch: {
        label: "\u8df3\u8f7b\u62f3",
        startup: 5,
        active: 8,
        recovery: 13,
        damage: 7,
        hitstun: 18,
        push: 4.8,
        hitRecoil: 0.8,
        hitLevel: "overhead",
        mustStandBlock: true,
        airborne: true,
        pose: "jumpPunch",
        box: { x: 30, y: -88, w: 52, h: 24 },
      },
      jumpLightKick: {
        label: "\u8df3\u8f7b\u817f",
        startup: 6,
        active: 9,
        recovery: 15,
        damage: 8,
        hitstun: 20,
        push: 5.4,
        hitRecoil: 0.7,
        hitLevel: "overhead",
        mustStandBlock: true,
        airborne: true,
        pose: "jumpKick",
        box: { x: 26, y: -66, w: 72, h: 24 },
      },
      jumpHeavyPunch: {
        label: "\u8df3\u91cd\u62f3",
        startup: 8,
        active: 8,
        recovery: 18,
        damage: 12,
        hitstun: 24,
        push: 6.8,
        hitRecoil: 0.9,
        hitLevel: "overhead",
        mustStandBlock: true,
        airborne: true,
        pose: "jumpPunch",
        box: { x: 34, y: -92, w: 66, h: 30 },
      },
      jumpHeavyKick: {
        label: "\u8df3\u91cd\u817f",
        startup: 9,
        active: 10,
        recovery: 20,
        damage: 14,
        hitstun: 27,
        push: 7.6,
        hitRecoil: 0.75,
        hitLevel: "overhead",
        mustStandBlock: true,
        airborne: true,
        pose: "jumpKick",
        box: { x: 24, y: -72, w: 88, h: 28 },
      },
    };

    const keyToAttack = {
      u: "lightPunch",
      i: "lightKick",
      j: "heavyPunch",
      k: "heavyKick",
    };
    const crouchAttackNames = {
      lightPunch: "crouchLightPunch",
      lightKick: "crouchLightKick",
      heavyPunch: "crouchHeavyPunch",
      heavyKick: "crouchHeavyKick",
    };
    const jumpAttackNames = {
      lightPunch: "jumpLightPunch",
      lightKick: "jumpLightKick",
      heavyPunch: "jumpHeavyPunch",
      heavyKick: "jumpHeavyKick",
    };

    const round = {
      running: false,
      paused: false,
      over: false,
      timer: 99,
      frame: 0,
      message: "按 1 开始",
      sparks: [],
      combo: {
        attacker: null,
        defender: null,
        count: 0,
        timer: 0,
      },
    };

    const spriteFrame = {
      idleA: 0,
      idleB: 1,
      walkA: 2,
      walkB: 3,
      run: 4,
      crouch: 5,
      guard: 6,
      punch: 7,
      kick: 8,
      antiAir: 9,
      jumpPunch: 10,
      jumpKick: 11,
      sweep: 12,
      hit: 13,
    };
    const spriteSheets = {
      kyo: {
        image: Object.assign(new Image(), { src: "assets/sprites/kyo-chibi.svg" }),
        frameW: 48,
        frameH: 64,
        scale: 2.45,
        flame: "#ff8a22",
      },
      iori: {
        image: Object.assign(new Image(), { src: "assets/sprites/iori-chibi.svg" }),
        frameW: 48,
        frameH: 64,
        scale: 2.45,
        flame: "#8b5cff",
      },
    };

    function makeFighter(id, name, x, palette, controlledByPlayer, spriteKey) {
      return {
        id,
        name,
        x,
        y: floorY,
        vx: 0,
        vy: 0,
        w: 50,
        h: 104,
        facing: id === "p1" ? 1 : -1,
        health: 100,
        energy: 0,
        state: "idle",
        stateFrame: 0,
        attackName: null,
        hasHit: false,
        guardType: null,
        blockstunFrames: 0,
        hitFlash: 0,
        comboCancelFrames: 0,
        ai: {
          enabled: !controlledByPlayer,
          thinkFrame: 0,
          plan: "hold",
          planTimer: 0,
          attackCooldown: 0,
          guardBias: 0.42,
          guardCooldown: 0,
          guardReactionTimer: 0,
          guardReactionType: "stand",
        },
        palette,
        controlledByPlayer,
        spriteKey,
      };
    }

    let player = makeFighter("p1", "草薙京", 250, {
      suit: "#191b22",
      trim: "#ff8a22",
      skin: "#f3c7a0",
      shadow: "#0d0f13",
    }, true, "kyo");

    let enemy = makeFighter("p2", "八神庵", 710, {
      suit: "#8f1e2d",
      trim: "#b99cff",
      skin: "#f1c6a1",
      shadow: "#250d18",
    }, false, "iori");

    const fighters = [player, enemy];

    addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["a", "s", "d", "w", "u", "i", "j", "k", "1", "2"].includes(key)) {
        event.preventDefault();
      }
      if (!keys.get(key)) {
        justPressed.add(key);
        if (key === "s") crouchTapFrames = inputConfig.crouchTapHoldFrames;
        if (key === "a" || key === "d") registerDirectionTap(key);
      }
      if (keyToAttack[key]) {
        attackBuffer.name = keyToAttack[key];
        attackBuffer.frames = inputConfig.attackBufferFrames;
      }
      keys.set(key, true);

      if (key === "1") startRound();
      if (key === "2" && round.running && !round.over) {
        round.paused = !round.paused;
        round.message = round.paused ? "暂停" : "";
      }
    });

    addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      keys.set(key, false);
      if (key === "w") cutPlayerJump();
    });

    function startRound() {
      player = makeFighter("p1", "草薙京", 250, player.palette, true, player.spriteKey);
      enemy = makeFighter("p2", "八神庵", 710, enemy.palette, false, enemy.spriteKey);
      fighters[0] = player;
      fighters[1] = enemy;
      round.running = true;
      round.paused = false;
      round.over = false;
      round.timer = 99;
      round.frame = 0;
      round.sparks = [];
      round.combo = { attacker: null, defender: null, count: 0, timer: 0 };
      round.message = "";
      crouchTapFrames = 0;
      attackBuffer = { name: null, frames: 0 };
      directionTap = { direction: null, frames: 0 };
      movementBuffer = { action: null, direction: 0, frames: 0 };
    }

    function onGround(f) {
      return Math.abs(f.y - floorY) < 0.01;
    }

    function canAct(f) {
      return ["idle", "walk", "run", "crouch", "jump"].includes(f.state);
    }

    function opponentOf(f) {
      return f === player ? enemy : player;
    }

    function directionForKey(f, key) {
      const absoluteDirection = key === "d" ? 1 : -1;
      return absoluteDirection === f.facing ? "forward" : "back";
    }

    function registerDirectionTap(key) {
      const direction = directionForKey(player, key);
      const isDoubleTap = directionTap.direction === direction && directionTap.frames > 0;

      if (isDoubleTap) {
        movementBuffer.action = direction === "forward" ? "run" : "backHop";
        movementBuffer.direction = direction === "forward" ? player.facing : -player.facing;
        movementBuffer.frames = inputConfig.dashBufferFrames;
        directionTap.frames = 0;
        return;
      }

      directionTap.direction = direction;
      directionTap.frames = inputConfig.dashTapFrames;
    }

    function heldMoveDirection(intent) {
      if (intent.left && !intent.right) return -1;
      if (intent.right && !intent.left) return 1;
      return 0;
    }

    function cutPlayerJump() {
      if (player.state === "jump" && player.vy < inputConfig.jumpCutSpeed) {
        player.vy = inputConfig.jumpCutSpeed;
      }
    }

    function isGuardState(f) {
      return ["guardStartup", "block", "blockstun", "guardRecovery"].includes(f.state);
    }

    function guardTypeFromIntent(f, intent, target = opponentOf(f)) {
      const targetOnRight = target.x > f.x;
      const holdingBack = targetOnRight
        ? intent.left && !intent.right
        : intent.right && !intent.left;

      if (!holdingBack || !onGround(f)) return null;
      return intent.down ? "crouch" : "stand";
    }

    function attackNameFromIntent(f, intent) {
      if (!intent.attack) return null;
      if (!onGround(f)) return jumpAttackNames[intent.attack];
      const wantsCrouchAttack = intent.down && onGround(f);
      return wantsCrouchAttack ? crouchAttackNames[intent.attack] : intent.attack;
    }

    function setBackDirection(intent, f, target, crouch = false) {
      const targetOnRight = target.x > f.x;
      intent.left = targetOnRight;
      intent.right = !targetOnRight;
      intent.down = crouch;
      intent.block = true;
    }

    function opponentIsAttacking(f) {
      const target = opponentOf(f);
      return target.state === "attack" && currentAttackData(target);
    }

    function startRun(f, direction) {
      if (!canAct(f) || !onGround(f) || direction === 0) return false;
      f.vx = direction * 5.25;
      f.vy = 0;
      setState(f, "run");
      return true;
    }

    function startBackHop(f, direction) {
      if (!canAct(f) || !onGround(f) || direction === 0) return false;
      f.vx = direction * 5.4;
      f.vy = -12.2;
      setState(f, "backHop");
      return true;
    }

    function startGuard(f, guardType) {
      if (!canAct(f) || !onGround(f)) return false;
      f.guardType = guardType;
      f.attackName = null;
      f.hasHit = false;
      setState(f, "guardStartup");
      f.vx *= 0.35;
      return true;
    }

    function startGuardRecovery(f) {
      f.guardType = null;
      f.blockstunFrames = 0;
      setState(f, "guardRecovery");
      f.vx *= 0.45;
    }

    function guardBeatsHit(guardType, data, attacker) {
      const hitLevel = !onGround(attacker) ? "overhead" : data.hitLevel;
      if (hitLevel === "low" || data.mustCrouchBlock) return guardType === "crouch";
      if (hitLevel === "overhead" || data.mustStandBlock) return guardType === "stand";
      return guardType === "stand" || guardType === "crouch";
    }

    function startAttack(f, attackName, force = false) {
      if (!attacks[attackName] || (!force && !canAct(f))) return false;
      f.state = "attack";
      f.stateFrame = 0;
      f.attackName = attackName;
      f.hasHit = false;
      f.guardType = null;
      f.blockstunFrames = 0;
      f.comboCancelFrames = 0;
      return true;
    }

    function canHitCancelAttack(f, attackName) {
      const current = currentAttackData(f);
      const next = attacks[attackName];
      return f.state === "attack"
        && f.comboCancelFrames > 0
        && current
        && current.chainCancel
        && next
        && next.chainFollowup
        && onGround(f);
    }

    function setState(f, state) {
      if (f.state !== state) {
        f.state = state;
        f.stateFrame = 0;
      }
    }

    function hurtbox(f) {
      const crouch = isCrouchingPosture(f);
      const height = crouch ? 74 : f.h;
      return {
        x: f.x - f.w / 2,
        y: f.y - height,
        w: f.w,
        h: height,
      };
    }

    function pushbox(f) {
      return {
        x: f.x - 28,
        y: f.y - 96,
        w: 56,
        h: 96,
      };
    }

    function currentAttackData(f) {
      return f.attackName ? attacks[f.attackName] : null;
    }

    function isCrouchingPosture(f) {
      const data = currentAttackData(f);
      return f.state === "crouch" || (isGuardState(f) && f.guardType === "crouch") || (f.state === "attack" && data && data.crouching);
    }

    function attackIsActive(f) {
      const data = currentAttackData(f);
      if (!data || f.state !== "attack") return false;
      return f.stateFrame >= data.startup && f.stateFrame < data.startup + data.active;
    }

    function attackbox(f) {
      const data = currentAttackData(f);
      if (!data || !attackIsActive(f)) return null;
      const b = data.box;
      const x = f.facing === 1 ? f.x + b.x : f.x - b.x - b.w;
      return { x, y: f.y + b.y, w: b.w, h: b.h };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function playerIntent() {
      const intent = {
        left: false,
        right: false,
        up: false,
        jumpHeld: false,
        down: false,
        attack: null,
        movementAction: null,
        movementDirection: 0,
        block: false,
        consumeAttack: () => {
          attackBuffer.name = null;
          attackBuffer.frames = 0;
        },
        consumeMovement: () => {
          movementBuffer.action = null;
          movementBuffer.direction = 0;
          movementBuffer.frames = 0;
        },
      };
      intent.left = keys.get("a");
      intent.right = keys.get("d");
      intent.up = justPressed.has("w");
      intent.jumpHeld = keys.get("w");
      intent.down = keys.get("s") || crouchTapFrames > 0;
      intent.attack = attackBuffer.name;
      intent.movementAction = movementBuffer.action;
      intent.movementDirection = movementBuffer.direction;
      intent.block = false;
      return intent;
    }

    function updateInputBuffers() {
      if (!keys.get("s")) crouchTapFrames = Math.max(0, crouchTapFrames - 1);
      if (directionTap.frames > 0) directionTap.frames -= 1;
      if (directionTap.frames <= 0) directionTap.direction = null;
      if (movementBuffer.frames > 0) movementBuffer.frames -= 1;
      if (movementBuffer.frames <= 0) {
        movementBuffer.action = null;
        movementBuffer.direction = 0;
      }
      if (attackBuffer.frames > 0) attackBuffer.frames -= 1;
      if (attackBuffer.frames <= 0) attackBuffer.name = null;
    }

    function aiIntent(ai, target) {
      const intent = { left: false, right: false, up: false, jumpHeld: true, down: false, attack: null, block: false };
      const distance = Math.abs(target.x - ai.x);
      const targetOnRight = target.x > ai.x;
      const targetAttack = currentAttackData(target);
      const targetThreatening = target.state === "attack" && targetAttack && distance < 172 && onGround(ai);

      ai.ai.thinkFrame += 1;
      ai.ai.planTimer -= 1;
      ai.ai.attackCooldown = Math.max(0, ai.ai.attackCooldown - 1);
      ai.ai.guardCooldown = Math.max(0, ai.ai.guardCooldown - 1);
      ai.ai.guardReactionTimer = Math.max(0, ai.ai.guardReactionTimer - 1);

      if (targetThreatening && canAct(ai) && ai.ai.guardCooldown === 0) {
        if (ai.ai.guardReactionTimer === 0 && Math.random() < ai.ai.guardBias) {
          ai.ai.guardReactionTimer = 9 + Math.floor(Math.random() * 10);
          ai.ai.guardReactionType = targetAttack.hitLevel === "low" ? "crouch" : "stand";
        }

        if (ai.ai.guardReactionTimer <= 1) {
          setBackDirection(intent, ai, target, ai.ai.guardReactionType === "crouch");
          ai.ai.plan = "guard";
          ai.ai.planTimer = 10 + Math.floor(Math.random() * 10);
          ai.ai.guardCooldown = 28 + Math.floor(Math.random() * 18);
          return intent;
        }
      }

      if (ai.ai.planTimer <= 0 || ai.ai.thinkFrame % 18 === 0) {
        const roll = Math.random();
        if (distance > 210) {
          ai.ai.plan = roll < 0.78 ? "approach" : "wait";
          ai.ai.planTimer = 24 + Math.floor(Math.random() * 26);
        } else if (distance > 112) {
          ai.ai.plan = roll < 0.5 ? "approach" : roll < 0.78 ? "poke" : "retreat";
          ai.ai.planTimer = 16 + Math.floor(Math.random() * 22);
        } else {
          ai.ai.plan = roll < 0.44 ? "attack" : roll < 0.68 && ai.ai.guardCooldown === 0 ? "guard" : roll < 0.84 ? "retreat" : "jump";
          ai.ai.planTimer = 12 + Math.floor(Math.random() * 18);
          if (ai.ai.plan === "guard") {
            ai.ai.planTimer = 10 + Math.floor(Math.random() * 14);
            ai.ai.guardCooldown = 34 + Math.floor(Math.random() * 28);
          }
        }
      }

      if (ai.ai.plan === "approach") {
        intent.right = targetOnRight;
        intent.left = !targetOnRight;
      } else if (ai.ai.plan === "retreat") {
        intent.left = targetOnRight;
        intent.right = !targetOnRight;
      } else if (ai.ai.plan === "guard") {
        setBackDirection(intent, ai, target, Math.random() < 0.45);
      } else if (ai.ai.plan === "jump" && onGround(ai)) {
        intent.up = true;
        intent.right = targetOnRight;
        intent.left = !targetOnRight;
      }

      if (canAct(ai) && ai.ai.attackCooldown === 0) {
        if (distance < 118 && (ai.ai.plan === "attack" || Math.random() < 0.035)) {
          intent.attack = Math.random() < 0.55 ? "lightPunch" : "lightKick";
          if (Math.random() < 0.26) intent.attack = Math.random() < 0.5 ? "heavyPunch" : "heavyKick";
          ai.ai.attackCooldown = 24 + Math.floor(Math.random() * 18);
        } else if (distance < 150 && ai.ai.plan === "poke") {
          intent.attack = Math.random() < 0.65 ? "lightKick" : "heavyPunch";
          ai.ai.attackCooldown = 28;
        }
      }

      return intent;
    }

    function applyIntent(f, intent) {
      if (f.state === "hitstun" || f.state === "knockdown") return;
      const guardType = guardTypeFromIntent(f, intent);
      const shouldGuard = guardType && (intent.block || opponentIsAttacking(f));
      const attackName = attackNameFromIntent(f, intent);

      if (attackName && canHitCancelAttack(f, attackName)) {
        startAttack(f, attackName, true);
        if (intent.consumeAttack) intent.consumeAttack();
        return;
      }

      if (f.state === "attack") return;

      if (f.state === "blockstun" || f.state === "guardRecovery") return;

      if (intent.movementAction === "run" && startRun(f, intent.movementDirection)) {
        if (intent.consumeMovement) intent.consumeMovement();
        return;
      }

      if (intent.movementAction === "backHop" && startBackHop(f, intent.movementDirection)) {
        if (intent.consumeMovement) intent.consumeMovement();
        return;
      }

      if (f.state === "guardStartup") {
        if (shouldGuard) {
          f.guardType = guardType;
        } else {
          startGuardRecovery(f);
        }
        return;
      }

      if (f.state === "block") {
        if (shouldGuard) {
          f.guardType = guardType;
          f.vx *= 0.45;
        } else {
          startGuardRecovery(f);
        }
        return;
      }

      if (shouldGuard && startGuard(f, guardType)) {
        return;
      }

      if (attackName && startAttack(f, attackName)) {
        if (intent.consumeAttack) intent.consumeAttack();
        return;
      }

      const grounded = onGround(f);
      const speed = 2.8;
      if (canAct(f)) {
        if (!grounded) return;

        if (intent.down) {
          f.vx *= 0.58;
          setState(f, "crouch");
        } else if (f.state === "run") {
          const moveDirection = heldMoveDirection(intent);
          if (moveDirection === f.facing) {
            f.vx = f.facing * 5.25;
          } else {
            f.vx *= 0.62;
            if (Math.abs(f.vx) < 0.55) setState(f, "idle");
          }
        } else if (intent.left && !intent.right) {
          f.vx = -speed;
          setState(f, "walk");
        } else if (intent.right && !intent.left) {
          f.vx = speed;
          setState(f, "walk");
        } else {
          f.vx *= 0.68;
          if (Math.abs(f.vx) < 0.15) setState(f, intent.down ? "crouch" : "idle");
        }

        if (intent.up) {
          f.vy = intent.jumpHeld ? inputConfig.jumpSpeed : inputConfig.shortHopSpeed;
          setState(f, "jump");
        }
      }
    }

    function updateFighter(f) {
      f.stateFrame += 1;
      f.hitFlash = Math.max(0, f.hitFlash - 1);

      if (f.state === "attack") {
        const data = currentAttackData(f);
        f.comboCancelFrames = Math.max(0, f.comboCancelFrames - 1);
        f.vx *= onGround(f) ? 0.58 : 0.92;
        if (data && f.stateFrame > data.startup + data.active + data.recovery) {
          f.attackName = null;
          f.hasHit = false;
          f.comboCancelFrames = 0;
          setState(f, onGround(f) ? "idle" : "jump");
        }
      }

      if (f.state === "guardStartup") {
        f.vx *= 0.58;
        if (f.stateFrame >= guardConfig.startup) setState(f, "block");
      }

      if (f.state === "block") {
        f.vx *= 0.62;
      }

      if (f.state === "blockstun") {
        f.vx *= 0.84;
        if (f.stateFrame >= f.blockstunFrames) setState(f, "block");
      }

      if (f.state === "guardRecovery") {
        f.vx *= 0.7;
        if (f.stateFrame >= guardConfig.recovery) setState(f, onGround(f) ? "idle" : "jump");
      }

      if (f.state === "hitstun") {
        f.vx *= 0.9;
        if (f.stateFrame > f.hitstunFrames) {
          f.comboCancelFrames = 0;
          setState(f, onGround(f) ? "idle" : "jump");
        }
      }

      if (f.state === "knockdown") {
        f.vx *= 0.88;
        if (f.stateFrame > 48 && f.health > 0) setState(f, "idle");
      }

      if (f.state === "backHop") {
        f.vx *= 0.985;
      }

      if (!onGround(f) || f.vy < 0) {
        f.vy += gravity;
        f.y += f.vy;
        if (f.y >= floorY) {
          f.y = floorY;
          f.vy = 0;
          if (f.state === "jump" || f.state === "backHop") setState(f, "idle");
        }
      }

      f.x += f.vx;
      f.x = Math.max(70, Math.min(W - 70, f.x));
    }

    function resolveFacingAndBody() {
      player.facing = player.x <= enemy.x ? 1 : -1;
      enemy.facing = enemy.x <= player.x ? 1 : -1;

      const p = pushbox(player);
      const e = pushbox(enemy);
      if (rectsOverlap(p, e)) {
        const overlap = Math.min(p.x + p.w - e.x, e.x + e.w - p.x);
        const direction = player.x < enemy.x ? -1 : 1;
        player.x += direction * overlap * 0.5;
        enemy.x -= direction * overlap * 0.5;
      }
    }

    function canBlock(defender, attacker, data) {
      const holdingGuard = defender.state === "block" || defender.state === "blockstun";
      const facingAttack = defender.facing === (attacker.x < defender.x ? -1 : 1);
      return holdingGuard && facingAttack && onGround(defender) && guardBeatsHit(defender.guardType, data, attacker);
    }

    function clearCombo() {
      round.combo.attacker = null;
      round.combo.defender = null;
      round.combo.count = 0;
      round.combo.timer = 0;
    }

    function registerHitCombo(attacker, defender, box) {
      const trueFollowup = defender.state === "hitstun"
        && round.combo.attacker === attacker
        && round.combo.defender === defender
        && round.combo.count > 0;

      if (trueFollowup) {
        round.combo.count += 1;
        round.combo.timer = 64;
      } else {
        round.combo.attacker = attacker;
        round.combo.defender = defender;
        round.combo.count = 1;
        round.combo.timer = 0;
      }

      round.combo.x = box.x + box.w / 2;
      round.combo.y = box.y - 18;
    }

    function checkHits() {
      for (const attacker of fighters) {
        if (attacker.state !== "attack" || attacker.hasHit) continue;
        const box = attackbox(attacker);
        if (!box) continue;

        const defender = opponentOf(attacker);
        if (!rectsOverlap(box, hurtbox(defender))) continue;

        const data = currentAttackData(attacker);
        attacker.hasHit = true;
        if (canBlock(defender, attacker, data)) {
          clearCombo();
          defender.blockstunFrames = data.blockstun || guardConfig.blockstun;
          setState(defender, "blockstun");
          defender.vx += attacker.facing * data.push * guardConfig.defenderPush;
          attacker.vx -= attacker.facing * data.push * guardConfig.attackerPush;
          attacker.energy = Math.min(100, attacker.energy + 2);
          spawnSpark(box.x + box.w / 2, box.y + box.h / 2, "#90e4ff", 7);
        } else {
          registerHitCombo(attacker, defender, box);
          defender.health = Math.max(0, defender.health - data.damage);
          defender.energy = Math.min(100, defender.energy + 8);
          attacker.energy = Math.min(100, attacker.energy + 5);
          defender.hitFlash = 8;
          defender.hitstunFrames = data.hitstun;
          defender.guardType = null;
          defender.blockstunFrames = 0;
          attacker.comboCancelFrames = data.chainCancel ? data.chainWindow || inputConfig.attackBufferFrames : 0;
          defender.vx = attacker.facing * data.push;
          attacker.vx -= attacker.facing * (data.hitRecoil || 0.35);
          defender.vy = defender.health <= 0 ? -7 : defender.vy;
          setState(defender, defender.health <= 0 ? "knockdown" : "hitstun");
          spawnSpark(box.x + box.w / 2, box.y + box.h / 2, "#ffd166", 12);
        }
      }
    }

    function spawnSpark(x, y, color, count) {
      for (let i = 0; i < count; i += 1) {
        round.sparks.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 7,
          vy: (Math.random() - 0.8) * 6,
          life: 18 + Math.random() * 10,
          color,
        });
      }
    }

    function updateSparks() {
      round.sparks = round.sparks.filter((s) => {
        s.life -= 1;
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.24;
        return s.life > 0;
      });
    }

    function updateRound() {
      if (!round.running || round.paused || round.over) return;

      round.frame += 1;
      if (round.frame % 60 === 0) round.timer = Math.max(0, round.timer - 1);
      round.combo.timer = Math.max(0, round.combo.timer - 1);

      applyIntent(player, playerIntent());
      applyIntent(enemy, aiIntent(enemy, player));
      updateInputBuffers();
      updateFighter(player);
      updateFighter(enemy);
      resolveFacingAndBody();
      checkHits();
      updateSparks();

      if (player.health <= 0 || enemy.health <= 0 || round.timer <= 0) {
        round.over = true;
        const pScore = player.health + (player.energy * 0.1);
        const eScore = enemy.health + (enemy.energy * 0.1);
        round.message = pScore === eScore ? "DRAW" : pScore > eScore ? "YOU WIN" : "CPU WINS";
      }
    }

    function drawStage() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#202734");
      sky.addColorStop(0.56, "#382730");
      sky.addColorStop(1, "#171515");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "rgba(255, 225, 150, 0.08)";
      for (let i = 0; i < 9; i += 1) {
        const x = i * 128 - ((round.frame * 0.3) % 128);
        ctx.fillRect(x, 70 + (i % 3) * 18, 54, 180);
      }

      ctx.fillStyle = "#24202a";
      ctx.fillRect(0, floorY, W, H - floorY);
      ctx.fillStyle = "#383340";
      ctx.fillRect(0, floorY, W, 12);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
      ctx.lineWidth = 1;
      for (let x = -80; x < W + 80; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, floorY);
        ctx.lineTo(x + 52, H);
        ctx.stroke();
      }
    }

    function drawHealthBar(x, y, width, value, name, alignRight, color) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
      ctx.fillRect(x, y, width, 22);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.34)";
      ctx.strokeRect(x, y, width, 22);

      const fill = Math.max(0, value) / 100 * width;
      ctx.fillStyle = color;
      const fillX = alignRight ? x + width - fill : x;
      ctx.fillRect(fillX, y, fill, 22);

      ctx.fillStyle = "#f5efe6";
      ctx.font = "700 16px Inter, sans-serif";
      ctx.textAlign = alignRight ? "right" : "left";
      ctx.fillText(name, alignRight ? x + width : x, y - 8);
    }

    function drawHud() {
      drawHealthBar(38, 38, 350, player.health, player.name, false, "#ff8a22");
      drawHealthBar(W - 388, 38, 350, enemy.health, enemy.name, true, "#8f1e2d");

      ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
      ctx.fillRect(W / 2 - 48, 24, 96, 64);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
      ctx.strokeRect(W / 2 - 48, 24, 96, 64);
      ctx.fillStyle = "#f8ecd8";
      ctx.font = "800 34px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(String(round.timer).padStart(2, "0"), W / 2, 67);

      drawEnergy(38, 68, player.energy, false, "#ffd166");
      drawEnergy(W - 238, 68, enemy.energy, true, "#b99cff");
      drawCombo();
    }

    function drawEnergy(x, y, value, alignRight, color) {
      const width = 200;
      ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
      ctx.fillRect(x, y, width, 8);
      ctx.fillStyle = color;
      const fill = value / 100 * width;
      ctx.fillRect(alignRight ? x + width - fill : x, y, fill, 8);
    }

    function drawCombo() {
      if (round.combo.count < 2 || round.combo.timer <= 0) return;

      const playerCombo = round.combo.attacker === player;
      const x = playerCombo ? 130 : W - 130;
      const y = 126;
      const alpha = Math.min(1, round.combo.timer / 14);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = playerCombo ? "left" : "right";
      ctx.fillStyle = playerCombo ? "#ffe068" : "#8df0c7";
      ctx.font = "900 34px Inter, sans-serif";
      ctx.fillText(`COMBO ${round.combo.count}`, x, y);
      ctx.fillStyle = "rgba(255, 244, 221, 0.74)";
      ctx.font = "700 12px Inter, sans-serif";
      ctx.fillText("TRUE HITSTUN CHAIN", x, y + 20);
      ctx.restore();
    }

    function spriteFrameName(f) {
      const activeAttack = currentAttackData(f);
      if (f.state === "knockdown") return "hit";
      if (f.state === "hitstun") return "hit";
      if (["guardStartup", "block", "blockstun"].includes(f.state)) return "guard";
      if (f.state === "crouch") return "crouch";
      if (f.state === "attack" && activeAttack) {
        if (activeAttack.pose === "jumpPunch") return "jumpPunch";
        if (activeAttack.pose === "jumpKick") return "jumpKick";
        if (activeAttack.pose === "antiAir") return "antiAir";
        if (activeAttack.pose === "sweep" || activeAttack.pose === "lowKick") return "sweep";
        return f.attackName.includes("Punch") ? "punch" : "kick";
      }
      if (!onGround(f) || f.state === "backHop") return f.vy < 0 ? "jumpPunch" : "jumpKick";
      if (f.state === "run") return "run";
      if (f.state === "walk") return Math.floor(f.stateFrame / 7) % 2 ? "walkA" : "walkB";
      return Math.floor(f.stateFrame / 24) % 2 ? "idleA" : "idleB";
    }

    function drawAttackAura(f, frameName) {
      if (f.state !== "attack") return;
      const sheet = spriteSheets[f.spriteKey];
      const pulse = Math.sin(round.frame * 0.35) * 0.5 + 0.5;
      const x = f.x + f.facing * (frameName.toLowerCase().includes("kick") || frameName === "sweep" ? 72 : 56);
      const y = f.y - (frameName === "antiAir" ? 132 : frameName.startsWith("jump") ? 92 : 76);

      ctx.save();
      ctx.globalAlpha = 0.5 + pulse * 0.28;
      ctx.fillStyle = sheet.flame;
      ctx.fillRect(x - 10, y - 7, 20, 8);
      ctx.fillRect(x - 5, y - 18, 10, 12);
      ctx.fillStyle = "rgba(255, 240, 190, 0.74)";
      ctx.fillRect(x - 3, y - 10, 6, 7);
      ctx.restore();
    }

    function drawSpriteFighter(f) {
      const sheet = spriteSheets[f.spriteKey];
      const frameName = spriteFrameName(f);
      const frameIndex = spriteFrame[frameName] ?? 0;
      const displayW = sheet.frameW * sheet.scale;
      const displayH = sheet.frameH * sheet.scale;
      const bob = f.state === "walk" || f.state === "run" ? Math.sin(f.stateFrame * 0.38) * 3 : 0;

      ctx.fillStyle = "rgba(0, 0, 0, 0.34)";
      ctx.beginPath();
      ctx.ellipse(f.x, f.y + 5, 48, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      drawAttackAura(f, frameName);

      ctx.save();
      ctx.translate(f.x, f.y + bob);
      ctx.scale(f.facing, 1);
      if (f.hitFlash > 0) {
        ctx.globalAlpha = 0.38;
        ctx.fillStyle = "#fff6d8";
        ctx.fillRect(-displayW / 2 - 2, -displayH - 2, displayW + 4, displayH + 4);
        ctx.globalAlpha = 1;
      }
      ctx.drawImage(
        sheet.image,
        frameIndex * sheet.frameW,
        0,
        sheet.frameW,
        sheet.frameH,
        -displayW / 2,
        -displayH,
        displayW,
        displayH
      );
      ctx.restore();
    }

    function drawFallbackFighter(f) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.scale(f.facing, 1);
      ctx.fillStyle = f.palette.shadow;
      ctx.fillRect(-24, -94, 48, 78);
      ctx.fillStyle = f.palette.suit;
      ctx.fillRect(-20, -92, 40, 66);
      ctx.fillStyle = f.palette.skin;
      ctx.fillRect(-18, -124, 36, 30);
      ctx.restore();
    }

    function drawFighter(f) {
      const sheet = spriteSheets[f.spriteKey];
      if (sheet && sheet.image.complete && sheet.image.naturalWidth > 0) {
        drawSpriteFighter(f);
      } else {
        drawFallbackFighter(f);
      }

      if (showDebugBoxes) {
        const hb = hurtbox(f);
        ctx.strokeStyle = "rgba(120, 220, 255, 0.32)";
        ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);

        const ab = attackbox(f);
        if (ab) {
          ctx.fillStyle = "rgba(255, 72, 72, 0.26)";
          ctx.fillRect(ab.x, ab.y, ab.w, ab.h);
          ctx.strokeStyle = "rgba(255, 235, 120, 0.84)";
          ctx.strokeRect(ab.x, ab.y, ab.w, ab.h);
        }
      }

      if (f.state === "attack") {
        const data = currentAttackData(f);
        ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
        ctx.font = "700 13px Inter, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(data.label, f.x, f.y - f.h - 50);
      } else if (f.state === "hitstun") {
        ctx.fillStyle = "rgba(255, 218, 120, 0.86)";
        ctx.font = "700 13px Inter, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("\u4e0d\u80fd\u9632\u5fa1", f.x, f.y - f.h - 50);
      }
    }

    function drawSparks() {
      for (const s of round.sparks) {
        ctx.globalAlpha = Math.max(0, Math.min(1, s.life / 22));
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x - 3, s.y - 3, 6, 6);
      }
      ctx.globalAlpha = 1;
    }

    function drawMessage() {
      if (!round.message && round.running) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff4dd";
      ctx.font = "900 50px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(round.message || "按 1 开始", W / 2, H / 2 - 8);
      ctx.font = "600 18px Inter, sans-serif";
      ctx.fillStyle = "rgba(255, 244, 221, 0.76)";
      ctx.fillText("1", W / 2, H / 2 + 34);
    }

    function draw() {
      drawStage();
      drawHud();
      drawFighter(player.x < enemy.x ? player : enemy);
      drawFighter(player.x < enemy.x ? enemy : player);
      drawSparks();
      drawMessage();
    }

    let lastFrameTime = performance.now();
    let simAccumulator = 0;

    function frame(now) {
      const elapsed = Math.min(now - lastFrameTime, maxFrameMs);
      lastFrameTime = now;
      simAccumulator += elapsed;

      while (simAccumulator >= simStepMs) {
        updateRound();
        justPressed.clear();
        simAccumulator -= simStepMs;
      }

      draw();
      requestAnimationFrame(frame);
    }

    draw();
    requestAnimationFrame(frame);
  </script>
</body>
